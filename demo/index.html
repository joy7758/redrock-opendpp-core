<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>RedRock OpenDPP Demo</title>
<style>
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #1d1d1f;
  --muted: #6e6e73;
  --accent: #0071e3;
  --border: #e5e5ea;
}

body {
  margin: 0;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
               "Helvetica Neue", Arial, sans-serif;
  color: var(--text);
}

.container {
  max-width: 900px;
  margin: 80px auto;
  padding: 0 24px;
}

h1 {
  font-size: 36px;
  font-weight: 600;
  margin-bottom: 8px;
}

.subtitle {
  color: var(--muted);
  margin-bottom: 40px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
}

textarea {
  width: 100%;
  height: 160px;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  font-size: 14px;
  font-family: monospace;
  resize: vertical;
}

button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 14px;
  cursor: pointer;
  margin-top: 16px;
}

button:hover {
  opacity: 0.9;
}

pre {
  background: #f2f2f2;
  padding: 16px;
  border-radius: 12px;
  font-size: 13px;
  overflow-x: auto;
}
</style>
</head>
<body>

<div class="container">

<h1>OpenDPP Core</h1>
<div class="subtitle">
Minimal DPP Data Object Demonstration<br>
规范化 → 哈希 → 可验证基础
</div>

<div class="card">
<textarea id="input">
{
  "product_id": "BAT-001",
  "manufacturer": "Demo Factory",
  "timestamp": "2024-01-01T10:00:00Z"
}
</textarea>

<button onclick="generate()">Generate Hash</button>
</div>

<div class="card">
<h3>Output</h3>
<pre id="output">Ready.</pre>
</div>

</div>

<script>
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function generate() {
  try {
    const input = document.getElementById("input").value;
    const obj = JSON.parse(input);
    const canonical = JSON.stringify(obj);
    const hash = await sha256(canonical);

    document.getElementById("output").textContent =
      "Canonical JSON:\n" + canonical +
      "\n\nSHA-256:\n" + hash;

  } catch (e) {
    document.getElementById("output").textContent = "Invalid JSON";
  }
}
</script>

</body>
</html>
