<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RedRock OpenDPP Demo</title>
<style>
body { font-family: Arial; max-width: 800px; margin: 40px auto; }
textarea { width: 100%; height: 150px; }
button { margin: 10px 0; padding: 8px 12px; }
pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
</style>
</head>
<body>

<h2>RedRock OpenDPP Core — Demo</h2>

<p>输入 JSON 对象：</p>
<textarea id="input">
{
  "product_id": "BAT-001",
  "manufacturer": "Demo Factory",
  "timestamp": "2024-01-01T10:00:00Z"
}
</textarea>

<button onclick="generate()">生成 Hash</button>

<h3>输出：</h3>
<pre id="output"></pre>

<script>
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function generate() {
  try {
    const input = document.getElementById("input").value;
    const obj = JSON.parse(input);
    const canonical = JSON.stringify(obj);
    const hash = await sha256(canonical);
    document.getElementById("output").textContent =
      "Canonical JSON:\n" + canonical +
      "\n\nSHA-256:\n" + hash;
  } catch (e) {
    document.getElementById("output").textContent = "JSON 解析错误";
  }
}
</script>

</body>
</html>
